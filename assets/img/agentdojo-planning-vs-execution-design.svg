<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Planning vs Execution architecture diagram">
  <defs>
    <style>
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 18px Inter, Arial, sans-serif; fill: #374151; }
      .label { font: 700 22px Inter, Arial, sans-serif; fill: #111827; }
      .text { font: 500 16px Inter, Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 14px Inter, Arial, sans-serif; fill: #4b5563; }
      .plan { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; rx: 14; }
      .exec { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.5; rx: 14; }
      .contract { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; rx: 14; }
      .note { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.8; rx: 10; }
      .arrow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .back { stroke: #7c3aed; stroke-width: 2.2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowPurple); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#374151"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#ffffff"/>
  <text x="60" y="60" class="title">AgentDojo: Planning vs Execution (Separation of Concerns)</text>
  <text x="60" y="92" class="subtitle">Planning decides what to do; execution does it safely and step-by-step.</text>

  <!-- Planning block -->
  <rect x="60" y="140" width="500" height="470" class="plan"/>
  <text x="90" y="182" class="label">Planning Layer</text>
  <text x="90" y="210" class="small">(src/planning/* + PlanningContext)</text>

  <rect x="90" y="235" width="440" height="80" class="note"/>
  <text x="110" y="270" class="text">- Detects multi-step tasks</text>
  <text x="110" y="295" class="text">- Chooses strategy: todo / ToT-lite</text>

  <rect x="90" y="330" width="440" height="95" class="note"/>
  <text x="110" y="365" class="text">- Proposes / scores / refines plan candidates</text>
  <text x="110" y="390" class="text">- Enforces invariants (1 in_progress)</text>

  <rect x="90" y="440" width="440" height="145" class="note"/>
  <text x="110" y="475" class="text">Output: structured todo list (the contract)</text>
  <text x="110" y="502" class="small">1. [in_progress] Read README</text>
  <text x="110" y="525" class="small">2. [pending] Inspect src/ structure</text>
  <text x="110" y="548" class="small">3. [pending] Summarize architecture</text>

  <!-- Contract block -->
  <rect x="610" y="285" width="240" height="170" class="contract"/>
  <text x="640" y="325" class="label">Contract</text>
  <text x="640" y="355" class="text">Structured Todo</text>
  <text x="640" y="382" class="small">Inspectable • Validatable</text>
  <text x="640" y="405" class="small">Planner-agnostic interface</text>

  <!-- Execution block -->
  <rect x="900" y="140" width="240" height="470" class="exec"/>
  <text x="930" y="182" class="label">Execution Layer</text>
  <text x="930" y="210" class="small">(src/main.py loop + tools)</text>

  <rect x="920" y="235" width="200" height="95" class="note"/>
  <text x="935" y="270" class="text">- Call tool</text>
  <text x="935" y="295" class="text">- Capture result</text>
  <text x="935" y="318" class="text">- Append observation</text>

  <rect x="920" y="345" width="200" height="110" class="note"/>
  <text x="935" y="380" class="text">Safety gates</text>
  <text x="935" y="405" class="small">- HITL for run_bash</text>
  <text x="935" y="428" class="small">- Docker sandbox</text>

  <rect x="920" y="470" width="200" height="115" class="note"/>
  <text x="935" y="505" class="text">Inner loop:</text>
  <text x="935" y="530" class="small">LLM → tool → observation</text>
  <text x="935" y="553" class="small">repeat until final answer</text>

  <!-- arrows -->
  <path d="M560 370 L610 370" class="arrow"/>
  <path d="M850 370 L900 370" class="arrow"/>
  <path d="M900 510 C830 600, 700 640, 560 570" class="back"/>

  <text x="625" y="640" class="subtitle">Dashed feedback loop = drift guard / re-planning triggers.</text>
  <text x="60" y="700" class="small">Key idea: planners can evolve (todo → ToT-lite → verification), while execution stays stable, safe, and auditable.</text>
</svg>

<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AgentDojo hooks design diagram">
  <defs>
    <style>
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 18px Inter, Arial, sans-serif; fill: #374151; }
      .label { font: 600 20px Inter, Arial, sans-serif; fill: #111827; }
      .text { font: 500 16px Inter, Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 14px Inter, Arial, sans-serif; fill: #4b5563; }
      .box { fill: #f9fafb; stroke: #d1d5db; stroke-width: 2; rx: 12; }
      .core { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; rx: 12; }
      .hook { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.5; rx: 12; }
      .impl { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .arrow { stroke: #374151; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .event { stroke: #7c3aed; stroke-width: 2.2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrowPurple); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#374151"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="60" y="60" class="title">AgentDojo Hooks Design (Observability Without Core-Loop Clutter)</text>
  <text x="60" y="92" class="subtitle">Core loop emits events → hook interface receives them → implementations decide how to render/log</text>

  <!-- Core loop -->
  <rect x="60" y="140" width="510" height="500" class="core"/>
  <text x="90" y="180" class="label">src/main.py (Core Agent Loop)</text>
  <text x="90" y="210" class="small">Behavior / decisions live here</text>

  <rect x="90" y="240" width="450" height="70" class="box"/>
  <text x="110" y="282" class="text">1) LLM response parsed (tool call or final answer)</text>

  <rect x="90" y="330" width="450" height="70" class="box"/>
  <text x="110" y="372" class="text">2) Tool executes (read_file / run_bash / todo)</text>

  <rect x="90" y="420" width="450" height="70" class="box"/>
  <text x="110" y="462" class="text">3) Observation appended to history</text>

  <rect x="90" y="510" width="450" height="100" class="box"/>
  <text x="110" y="548" class="text">4) Continue loop until non-tool assistant response</text>
  <text x="110" y="575" class="small">(multiple tool calls can happen in one user turn)</text>

  <!-- Hook protocol -->
  <rect x="640" y="190" width="500" height="220" class="hook"/>
  <text x="670" y="228" class="label">src/hooks.py — AgentHooks (Protocol)</text>
  <text x="670" y="258" class="small">Event surface (no state mutation)</text>
  <text x="670" y="290" class="text">• on_tool_call_detected(...)</text>
  <text x="670" y="320" class="text">• on_tool_result(...)</text>
  <text x="670" y="350" class="text">• on_planning_log(...)</text>
  <text x="670" y="380" class="text">• on_planning_flush()</text>

  <!-- Implementations -->
  <rect x="640" y="450" width="230" height="160" class="impl"/>
  <text x="665" y="490" class="label">NullHooks</text>
  <text x="665" y="520" class="small">Debug off</text>
  <text x="665" y="548" class="text">No-op handlers</text>

  <rect x="910" y="450" width="230" height="160" class="impl"/>
  <text x="935" y="490" class="label">DebugToolCallsHooks</text>
  <text x="935" y="520" class="small">Debug on</text>
  <text x="935" y="548" class="text">Rich panels + syntax</text>
  <text x="935" y="574" class="text">highlight + pretty output</text>

  <!-- arrows -->
  <path d="M540 275 C590 275, 600 255, 640 255" class="event"/>
  <path d="M540 365 C590 365, 600 305, 640 305" class="event"/>
  <path d="M540 455 C590 455, 600 355, 640 355" class="event"/>

  <path d="M890 410 L760 450" class="arrow"/>
  <path d="M890 410 L1025 450" class="arrow"/>

  <text x="650" y="660" class="subtitle">Key invariant: hooks observe events, but do not change agent decision logic.</text>
</svg>

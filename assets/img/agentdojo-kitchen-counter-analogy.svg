<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kitchen counter analogy for planning and execution">
  <defs>
    <style>
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 18px Inter, Arial, sans-serif; fill: #374151; }
      .label { font: 700 22px Inter, Arial, sans-serif; fill: #111827; }
      .text { font: 500 16px Inter, Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 14px Inter, Arial, sans-serif; fill: #4b5563; }
      .card { fill: #fef3c7; stroke: #d97706; stroke-width: 2.2; rx: 12; }
      .counter { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2.5; rx: 14; }
      .planner { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.2; rx: 12; }
      .exec { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.2; rx: 12; }
      .note { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.8; rx: 10; }
      .arrow { stroke: #374151; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #7c3aed; stroke-width: 2.2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrowPurple); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#374151"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#ffffff"/>

  <text x="60" y="60" class="title">Kitchen Counter Analogy (AgentDojo)</text>
  <text x="60" y="92" class="subtitle">Recipe card = plan state. Kitchen counter = full planning workspace.</text>

  <!-- Planner -->
  <rect x="60" y="140" width="250" height="130" class="planner"/>
  <text x="85" y="180" class="label">Planner</text>
  <text x="85" y="210" class="small">chooses / updates plan</text>
  <text x="85" y="235" class="small">(`todo` or `tot_lite`)</text>

  <!-- Counter -->
  <rect x="350" y="140" width="560" height="470" class="counter"/>
  <text x="380" y="180" class="label">Kitchen Counter = PlanningContext</text>
  <text x="380" y="208" class="small">All context needed while planning</text>

  <!-- Recipe card -->
  <rect x="390" y="235" width="250" height="155" class="card"/>
  <text x="415" y="270" class="label">Recipe Card</text>
  <text x="415" y="297" class="small">= TodoManager</text>
  <text x="415" y="325" class="text">1. [in_progress] Read file</text>
  <text x="415" y="350" class="text">2. [pending] Analyze</text>
  <text x="415" y="375" class="text">3. [pending] Summarize</text>

  <!-- Other counter items -->
  <rect x="670" y="235" width="210" height="80" class="note"/>
  <text x="690" y="268" class="text">LLM access</text>
  <text x="690" y="292" class="small">(ask for plan candidates)</text>

  <rect x="670" y="330" width="210" height="80" class="note"/>
  <text x="690" y="363" class="text">Tool dispatch</text>
  <text x="690" y="387" class="small">(call helper tools)</text>

  <rect x="670" y="425" width="210" height="80" class="note"/>
  <text x="690" y="458" class="text">Observations + logs</text>
  <text x="690" y="482" class="small">(trace + drift checks)</text>

  <!-- Execution -->
  <rect x="950" y="140" width="190" height="130" class="exec"/>
  <text x="975" y="180" class="label">Execution</text>
  <text x="975" y="210" class="small">runs concrete steps</text>
  <text x="975" y="235" class="small">safely + auditable</text>

  <rect x="950" y="300" width="190" height="140" class="note"/>
  <text x="968" y="335" class="text">LLM → tool</text>
  <text x="968" y="360" class="text">→ observation</text>
  <text x="968" y="385" class="small">repeat until final</text>
  <text x="968" y="410" class="small">answer</text>

  <!-- Arrows -->
  <path d="M310 205 L350 205" class="arrow"/>
  <path d="M640 312 C700 312, 740 290, 950 205" class="arrow"/>
  <path d="M950 380 C850 560, 620 620, 500 565" class="dashed"/>

  <text x="60" y="680" class="small">Reading guide: Planner works on the full counter (PlanningContext). Execution consumes concrete steps from the recipe card (TodoManager).</text>
  <text x="60" y="710" class="small">The recipe card is a subset of the counter: plan state only. The counter includes capabilities and runtime context.</text>
</svg>

# Site settings
title: "Pan's Dev Notes"
description: "Technical guides, lessons learned, and things I figured out the hard way."
baseurl: ""
url: "https://pancodia-lab.github.io"

# Theme
remote_theme: chesterhow/tale

# Author
author:
  name: Chao Pan
  url: https://github.com/pancodia

# Build settings
markdown: kramdown
include:
  - _pages

# Assets
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-remote-theme

# Permalinks
permalink: /:year-:month-:day/:title
paginate: 5

# Excludes
exclude: [Gemfile, Gemfile.lock, README.md]
